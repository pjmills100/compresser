<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Squish — File Compressor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">

    <div class="topbar">
      <div class="brand">
        <div class="brand-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor"/>
            <rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".5"/>
            <rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".5"/>
            <rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".25"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">Squish</div>
          <div class="brand-sub">File compressor</div>
        </div>
      </div>
      <a href="https://github.com/your-username/squish" target="_blank" class="gh-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        GitHub
      </a>
    </div>

    <main class="main">

      <!-- Drop Zone -->
      <div class="drop-zone" id="dropZone">
        <div class="drop-icon-ring">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M11 3v12M11 15l-4.5-4.5M11 15l4.5-4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 19h18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="drop-title">Drop files to compress</p>
        <p class="drop-hint">Images, code, documents — everything works</p>
        <label class="btn-upload" for="fileInput">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 1v8M7 1L4.5 3.5M7 1l2.5 2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M1 11v1a1 1 0 001 1h10a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          Choose files
        </label>
        <input type="file" id="fileInput" multiple hidden />
        <div class="format-row">
          <span class="fmt">JPG → WebP</span>
          <span class="fmt">PNG → WebP</span>
          <span class="fmt">JS minify</span>
          <span class="fmt">CSS minify</span>
          <span class="fmt">JSON</span>
          <span class="fmt">ZIP all</span>
        </div>
      </div>

      <!-- Queue -->
      <section class="section" id="queueSection" style="display:none">
        <div class="section-head">
          <span class="section-label">Queued <span class="cnt" id="qCount">0</span></span>
          <div class="row-btns">
            <button class="btn btn-primary" id="compressBtn">Compress all</button>
            <button class="btn btn-ghost" id="clearBtn">Clear</button>
          </div>
        </div>
        <div class="list-card" id="fileList"></div>
      </section>

      <!-- Results -->
      <section class="section" id="resultsSection" style="display:none">
        <div class="section-head">
          <span class="section-label">Results</span>
        </div>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="list-card" id="resultList"></div>
      </section>

    </main>

    <footer class="footer">
      <span>100% client-side · no uploads · no tracking</span>
    </footer>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
