<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compressor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">

    <header class="topbar">
      <div class="brand">
        <div class="brand-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor"/>
            <rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".5"/>
            <rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".5"/>
            <rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".25"/>
          </svg>
        </div>
        <span class="brand-name">Compressor</span>
      </div>
      <span class="brand-tagline">100% client-side · no uploads · no tracking</span>
    </header>

    <main class="main">

      <!-- Mode toggle -->
      <div class="mode-toggle">
        <button class="mode-btn active" id="modeFiles">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2.5 3A1.5 1.5 0 014 1.5h3.172a1.5 1.5 0 011.06.44l.829.828A1.5 1.5 0 009.12 3.25H10A1.5 1.5 0 0111.5 4.75V10.5A1.5 1.5 0 0110 12H4a1.5 1.5 0 01-1.5-1.5V3z" stroke="currentColor" stroke-width="1.3"/>
          </svg>
          Files
        </button>
        <button class="mode-btn" id="modeFolder">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1.5 4A1.5 1.5 0 013 2.5h2.379a1.5 1.5 0 011.06.44l.622.621A1.5 1.5 0 008.12 4H11A1.5 1.5 0 0112.5 5.5V10A1.5 1.5 0 0111 11.5H3A1.5 1.5 0 011.5 10V4z" stroke="currentColor" stroke-width="1.3"/>
          </svg>
          Folder
        </button>
      </div>

      <!-- Files drop zone -->
      <div class="drop-zone" id="filesZone">
        <div class="drop-icon-ring" id="filesIcon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 4v13M12 17l-5-5M12 17l5-5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 21h18" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="drop-title">Drop files to compress</p>
        <p class="drop-hint">Each file is compressed individually and downloaded automatically</p>
        <label class="btn-choose" for="filesInput">Choose files</label>
        <input type="file" id="filesInput" multiple hidden />
      </div>

      <!-- Folder drop zone -->
      <div class="drop-zone" id="folderZone" style="display:none">
        <div class="drop-icon-ring" id="folderIcon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M3 7a2 2 0 012-2h4.172a2 2 0 011.414.586l.828.828A2 2 0 0012.828 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z" stroke="currentColor" stroke-width="1.7"/>
          </svg>
        </div>
        <p class="drop-title">Drop a folder to ZIP it</p>
        <p class="drop-hint">The entire folder is bundled into a ZIP and downloaded automatically</p>
        <label class="btn-choose" for="folderInput">Choose folder</label>
        <input type="file" id="folderInput" webkitdirectory multiple hidden />
      </div>

      <!-- Progress / results -->
      <div id="statusArea"></div>

    </main>

    <footer class="footer">100% client-side · no uploads · no tracking</footer>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
