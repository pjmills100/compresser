<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compressor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f5; --surface: #fff; --surface-2: #f2f2f0;
      --border: rgba(0,0,0,0.08); --border-mid: rgba(0,0,0,0.13);
      --text: #111110; --text-2: #6f6e6b; --text-3: #a8a7a4;
      --green: #3b6d11; --green-bg: #eaf3de;
      --red: #a32d2d; --font: 'Geist', system-ui, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110; --surface: #1c1c1a; --surface-2: #242422;
        --border: rgba(255,255,255,0.07); --border-mid: rgba(255,255,255,0.12);
        --text: #eeede9; --text-2: #a8a7a4; --text-3: #6f6e6b;
        --green: #a8cc70; --green-bg: #1a2e08; --red: #f09595;
      }
    }

    html { -webkit-font-smoothing: antialiased; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; display: flex; flex-direction: column; }

    header { display: flex; align-items: center; justify-content: space-between; padding: .875rem 1.5rem; border-bottom: 1px solid var(--border); }
    .brand { display: flex; align-items: center; gap: 9px; }
    .brand-icon { width: 30px; height: 30px; background: var(--surface-2); border: 1px solid var(--border-mid); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-2); }
    .brand-name { font-size: 14px; font-weight: 600; letter-spacing: -.01em; }
    .tagline { font-size: 11px; color: var(--text-3); }

    main { flex: 1; max-width: 520px; width: 100%; margin: 0 auto; padding: 2.5rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; }

    .drop-zone { background: var(--surface); border: 1.5px dashed var(--border-mid); border-radius: 14px; padding: 3.5rem 2rem; text-align: center; cursor: pointer; transition: border-color .15s, background .15s; }
    .drop-zone:hover { border-color: var(--text-3); }
    .drop-zone.over { border-color: #185fa5; background: #e6f1fb; }
    @media (prefers-color-scheme: dark) { .drop-zone.over { background: #071a29; border-color: #70a8e8; } }

    .icon-ring { width: 56px; height: 56px; background: var(--surface-2); border: 1px solid var(--border-mid); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.1rem; color: var(--text-2); transition: background .15s, color .15s; }
    .drop-zone.over .icon-ring { background: #e6f1fb; color: #185fa5; }
    @media (prefers-color-scheme: dark) { .drop-zone.over .icon-ring { background: #071a29; color: #70a8e8; } }

    .drop-title { font-size: 15px; font-weight: 500; margin-bottom: 5px; }
    .drop-hint  { font-size: 12px; color: var(--text-3); margin-bottom: 1.25rem; }

    .pick-btns { display: flex; gap: 8px; justify-content: center; }
    .pick-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border-mid); border-radius: 8px; padding: 7px 16px; font-family: var(--font); font-size: 13px; font-weight: 500; color: var(--text); cursor: pointer; transition: background .12s; }
    .pick-btn:hover { background: var(--surface-2); }

    .results { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .result-row { display: flex; align-items: center; gap: 12px; padding: 11px 16px; border-bottom: 1px solid var(--border); animation: up .15s ease; }
    .result-row:last-child { border-bottom: none; }
    @keyframes up { from { opacity:0; transform:translateY(-3px); } to { opacity:1; } }

    .thumb { width: 32px; height: 32px; border-radius: 7px; background: var(--surface-2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; letter-spacing: .04em; color: var(--text-2); flex-shrink: 0; }

    .rinfo { flex: 1; min-width: 0; }
    .rname { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .rmeta { font-size: 11px; color: var(--text-3); margin-top: 1px; display: flex; align-items: center; gap: 6px; }

    .badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 100px; background: var(--green-bg); color: var(--green); }
    .badge-nil { background: var(--surface-2); color: var(--text-3); }

    .spinner { width: 14px; height: 14px; border: 1.5px solid var(--border-mid); border-top-color: var(--text-2); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tick { color: var(--green); flex-shrink: 0; }
    .err  { color: var(--red);   flex-shrink: 0; }

    .summary { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
    .stat { background: var(--surface-2); border-radius: 8px; padding: 11px 13px; }
    .stat-v { font-size: 16px; font-weight: 500; display: block; margin-bottom: 2px; }
    .stat-l { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: .05em; }

    footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); text-align: center; font-size: 11px; color: var(--text-3); }

    @media (max-width: 480px) { .summary { grid-template-columns: repeat(2,1fr); } .tagline { display: none; } }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <div class="brand-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor"/>
          <rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".5"/>
          <rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".5"/>
          <rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".25"/>
        </svg>
      </div>
      <span class="brand-name">Compressor</span>
    </div>
    <span class="tagline">100% client-side · no uploads · no tracking</span>
  </header>

  <main>
    <div class="drop-zone" id="zone">
      <div class="icon-ring">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 4v13M12 17l-5-5M12 17l5-5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 21h18" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="drop-title">Drop files or a folder here</p>
      <p class="drop-hint">Downloads automatically when done</p>
      <div class="pick-btns">
        <label class="pick-btn" for="fileIn">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 3a1 1 0 011-1h2.879a1 1 0 01.707.293l.621.621A1 1 0 007.914 3H10a1 1 0 011 1v6a1 1 0 01-1 1H3a1 1 0 01-1-1V3z" stroke="currentColor" stroke-width="1.2"/></svg>
          Files
        </label>
        <label class="pick-btn" for="folderIn">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1.5 3.5A1.5 1.5 0 013 2h2.379a1.5 1.5 0 011.06.44l.622.621A1.5 1.5 0 008.12 3.5H10A1.5 1.5 0 0111.5 5v5A1.5 1.5 0 0110 11.5H3A1.5 1.5 0 011.5 10V3.5z" stroke="currentColor" stroke-width="1.2"/></svg>
          Folder
        </label>
      </div>
      <input type="file" id="fileIn" multiple hidden />
      <input type="file" id="folderIn" webkitdirectory multiple hidden />
    </div>

    <div id="out"></div>
  </main>

  <footer>100% client-side · no uploads · no tracking</footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    const zone = document.getElementById('zone');
    const out  = document.getElementById('out');

    // Drag & drop
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
    ['dragleave','dragend'].forEach(ev => zone.addEventListener(ev, () => zone.classList.remove('over')));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('over');
      const items = [...(e.dataTransfer.items || [])];
      if (!items.length) return;
      const hasDir = items.some(i => i.webkitGetAsEntry && i.webkitGetAsEntry()?.isDirectory);
      if (hasDir && items[0].webkitGetAsEntry) {
        const all = []; let pending = items.length;
        items.forEach(item => {
          const entry = item.webkitGetAsEntry();
          if (!entry) { if (!--pending && all.length) runFolder(all); return; }
          readEntry(entry, '', () => { if (!--pending) runFolder(all); });
        });
        function readEntry(entry, path, done) {
          if (entry.isFile) {
            entry.file(f => { f._p = path + f.name; all.push(f); done(); });
          } else if (entry.isDirectory) {
            const reader = entry.createReader(); let entries = [];
            const read = () => reader.readEntries(batch => {
              if (!batch.length) {
                let sub = entries.length; if (!sub) { done(); return; }
                entries.forEach(e => readEntry(e, path + entry.name + '/', () => { if (!--sub) done(); }));
              } else { entries = entries.concat([...batch]); read(); }
            }); read();
          } else done();
        }
      } else {
        runFiles([...e.dataTransfer.files]);
      }
    });

    // File/folder pickers
    zone.addEventListener('click', e => { if (!e.target.closest('label') && !e.target.closest('input')) document.getElementById('fileIn').click(); });
    document.getElementById('fileIn').addEventListener('change', function() { if (this.files.length) runFiles([...this.files]); this.value = ''; });
    document.getElementById('folderIn').addEventListener('change', function() {
      if (!this.files.length) return;
      const files = [...this.files].map(f => { f._p = f.webkitRelativePath || f.name; return f; });
      runFolder(files); this.value = '';
    });

    // ── Run files (compress each) ──
    async function runFiles(files) {
      out.innerHTML = '';
      const card = mkCard(); let origTotal = 0, compTotal = 0;
      for (const file of files) {
        origTotal += file.size;
        const row = addRow(card, file.name, file.size);
        try {
          const res = await compressOne(file);
          compTotal += res.size;
          finishRow(row, res.name, res.size, file.size);
          dl(res.blob, res.name);
        } catch(_) { compTotal += file.size; errorRow(row); }
      }
      if (files.length > 1) addSummary(origTotal, compTotal);
    }

    // ── Run folder (bundle into one ZIP) ──
    async function runFolder(files) {
      if (!files.length) return;
      out.innerHTML = '';
      const folderName = (files[0]._p || files[0].name).split('/')[0] || 'folder';
      const outName = folderName + '.zip';
      const card = mkCard();
      const row = addRow(card, outName, null, 'Bundling…');
      let total = 0;
      try {
        const zip = new JSZip();
        for (const f of files) { zip.file(f._p || f.name, await f.arrayBuffer()); total += f.size; }
        const blob = await zip.generateAsync(
          { type:'blob', compression:'DEFLATE', compressionOptions:{level:9} },
          m => row.querySelector('.rmeta').textContent = 'Compressing… ' + Math.round(m.percent) + '%'
        );
        finishRow(row, outName, blob.size, total);
        dl(blob, outName);
        addSummary(total, blob.size);
      } catch(_) { errorRow(row); }
    }

    // ── Compress one file ──
    async function compressOne(file) {
      const ext = getExt(file.name).toLowerCase();

      if (['jpg','jpeg','png','gif','bmp','webp'].includes(ext)) {
        const bm = await createImageBitmap(file);
        const c = document.createElement('canvas');
        c.width = bm.width; c.height = bm.height;
        c.getContext('2d').drawImage(bm, 0, 0);
        const blob = await new Promise((r,j) => c.toBlob(b => b ? r(b) : j(), 'image/webp', 0.85));
        if (blob.size < file.size) return { name: replaceExt(file.name,'webp'), size: blob.size, blob };
        return { name: file.name, size: file.size, blob: file };
      }

      let t = await file.text();
      try {
        if (ext==='json') t = JSON.stringify(JSON.parse(t));
        else if (ext==='js') t = t.replace(/\/\*[\s\S]*?\*\//g,'').replace(/\/\/[^\n]*/g,'').replace(/\s+/g,' ').trim();
        else if (ext==='css') t = t.replace(/\/\*[\s\S]*?\*\//g,'').replace(/\s*([{};:,>])\s*/g,'$1').replace(/\s+/g,' ').trim();
        else if (['html','htm','svg'].includes(ext)) t = t.replace(/<!--[\s\S]*?-->/g,'').replace(/\s+/g,' ').replace(/>\s+</g,'><').trim();
      } catch(_) {}

      const z = new JSZip(); z.file(file.name, t);
      const blob = await z.generateAsync({ type:'blob', compression:'DEFLATE', compressionOptions:{level:9} });
      return { name: file.name+'.zip', size: blob.size, blob };
    }

    // ── UI ──
    function mkCard() { const d = document.createElement('div'); d.className='results'; out.appendChild(d); return d; }

    function addRow(card, name, size, meta) {
      const row = document.createElement('div'); row.className='result-row';
      row.innerHTML = `<div class="thumb">${ext4(name)}</div>
        <div class="rinfo"><span class="rname">${esc(name)}</span><span class="rmeta">${meta||(size!=null?fmt(size):'')}</span></div>
        <div class="spinner"></div>`;
      card.appendChild(row); return row;
    }

    function finishRow(row, name, newSize, origSize) {
      row.querySelector('.rname').textContent = name;
      const pct = origSize > 0 ? Math.round(((origSize-newSize)/origSize)*100) : 0;
      row.querySelector('.rmeta').innerHTML = `${fmt(newSize)} <span class="badge ${pct>0?'':'badge-nil'}">${pct>0?'-'+pct+'%':'no change'}</span>`;
      row.querySelector('.spinner').outerHTML = `<svg class="tick" width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9l4.5 4.5L15 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }

    function errorRow(row) {
      row.querySelector('.rmeta').innerHTML = `<span style="color:var(--red)">Failed</span>`;
      row.querySelector('.spinner').outerHTML = `<svg class="err" width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 4l10 10M14 4L4 14" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>`;
    }

    function addSummary(orig, comp) {
      const saved = orig-comp, pct = orig>0?Math.round((saved/orig)*100):0;
      const s = document.createElement('div'); s.className='summary'; s.style.marginTop='10px';
      s.innerHTML=`<div class="stat"><span class="stat-v">${fmt(orig)}</span><span class="stat-l">Original</span></div>
        <div class="stat"><span class="stat-v">${fmt(comp)}</span><span class="stat-l">Compressed</span></div>
        <div class="stat"><span class="stat-v">${fmt(Math.abs(saved))}</span><span class="stat-l">Saved</span></div>
        <div class="stat"><span class="stat-v">${pct}%</span><span class="stat-l">Reduction</span></div>`;
      out.appendChild(s);
    }

    function dl(blob, name) {
      const url = URL.createObjectURL(blob), a = document.createElement('a');
      a.href=url; a.download=name; document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),5000);
    }

    function fmt(b) { if(!b)return'0 B'; const k=1024,s=['B','KB','MB','GB'],i=Math.floor(Math.log(b)/Math.log(k)); return(b/Math.pow(k,i)).toFixed(1)+' '+s[i]; }
    function getExt(n) { return n.includes('.')?n.split('.').pop():''; }
    function replaceExt(n,e) { return n.includes('.')?n.slice(0,n.lastIndexOf('.'))+'.'+e:n+'.'+e; }
    function ext4(n) { return(getExt(n).slice(0,4)||'—').toUpperCase(); }
    function esc(s) { return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  </script>
</body>
</html>
